name: Quality Gate
on:
  push:
    branches: ['milestone/*', main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --break-system-packages
          fi
          pip install pytest pytest-cov ruff mypy --break-system-packages
      - name: Lint
        run: ruff check . || true
      - name: Type check (if applicable)
        run: mypy . --ignore-missing-imports || true
      - name: Test with coverage
        run: |
          if [ -d tests ]; then
            pytest tests/ --cov=. --cov-report=xml --cov-report=term --tb=short -q
            python - <<'PY'
          import sys, xml.etree.ElementTree as ET
          pct = float(ET.parse("coverage.xml").getroot().attrib.get("line-rate", "0")) * 100
          print(f"Coverage: {pct:.1f}%")
          sys.exit(0 if pct >= 70 else 1)
          PY
          fi
